<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel | Loudoun Investment</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB9iPohB5zvOtlEeBk1AvW7t7vP0DyuqCA",
      authDomain: "loudoun-invest.firebaseapp.com",
      projectId: "loudoun-invest",
      storageBucket: "loudoun-invest.firebasestorage.app",
      messagingSenderId: "533083952366",
      appId: "1:533083952366:web:570f34622c753a9edf4fff"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ADMIN_EMAIL = "realestateinvestors1984@gmail.com";

    onAuthStateChanged(auth, async (user) => {

      if (!user) {
        window.location.href = "login.html";
        return;
      }

      if (user.email !== ADMIN_EMAIL) {
        alert("Access Denied.");
        window.location.href = "dashboard.html";
        return;
      }

      loadUsers();
      loadInvestments();
    });

    async function loadUsers() {
      const querySnapshot = await getDocs(collection(db, "users"));
      const tableBody = document.getElementById("usersTable");
      tableBody.innerHTML = "";

      querySnapshot.forEach((doc) => {
        const data = doc.data();
        const row = `
          <tr>
            <td>${data.fullName}</td>
            <td>${data.email}</td>
            <td>${data.phone}</td>
          </tr>
        `;
        tableBody.innerHTML += row;
      });
    }

    async function loadInvestments() {
      const querySnapshot = await getDocs(collection(db, "investments"));
      const tableBody = document.getElementById("investmentsTable");
      tableBody.innerHTML = "";

      querySnapshot.forEach((doc) => {
        const data = doc.data();
        const row = `
          <tr>
            <td>${data.userId}</td>
            <td>${data.propertyName}</td>
            <td>$${data.amount}</td>
          </tr>
        `;
        tableBody.innerHTML += row;
      });
    }

    window.logoutUser = function() {
      signOut(auth).then(() => {
        window.location.href = "login.html";
      });
    };
  </script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h2 {
      margin-top: 40px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #334155;
    }

    th {
      background: #1e293b;
    }

    button {
      background: gold;
      border: none;
      padding: 10px 15px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h1>Admin Control Panel</h1>
  <button onclick="logoutUser()">Logout</button>

  <h2>Registered Users</h2>
  <table>
    <thead>
      <tr>
        <th>Full Name</th>
        <th>Email</th>
        <th>Phone</th>
      </tr>
    </thead>
    <tbody id="usersTable"></tbody>
  </table>

  <h2>All Investments</h2>
  <table>
    <thead>
      <tr>
        <th>User ID</th>
        <th>Property</th>
        <th>Amount (USD)</th>
      </tr>
    </thead>
    <tbody id="investmentsTable"></tbody>
  </table>

</body>
</html>
